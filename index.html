<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link rel="stylesheet" type="text/css" href="resources/horsey.min.css">
        <link rel="stylesheet" type="text/css" href="resources/ol-search-layer.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        </style>
        <title>Peta Lot & Google Satellite</title>
    </head>
    <body>
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="resources/horsey.min.js"></script>
        <script src="resources/ol-search-layer.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        
        <script src="layers/Lotfinal_0.js"></script>
        <script src="layers/batusempadanmerge_1.js"></script>
        <script src="styles/Lotfinal_0_style.js"></script>
        <script src="styles/batusempadanmerge_1_style.js"></script>

        <script>
        // 1. Definisi Google Satellite Layer
        var google_sat = new ol.layer.Tile({
            'title': 'Google Satellite',
            'type': 'base',
            'visible': true,
            source: new ol.source.XYZ({
                url: 'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
                attributions: ' &copy; Google Maps'
            })
        });

        var google_hybrid = new ol.layer.Tile({
            'title': 'Google Hybrid',
            'type': 'base',
            'visible': false,
            source: new ol.source.XYZ({
                url: 'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
                attributions: ' &copy; Google Maps'
            })
        });

        // 2. Load layers (Pastikan susunan: Base Layer di bawah, Vector di atas)
        // Nota: lyr_Lotfinal_0 dan lyr_batusempadanmerge_1 biasanya didefinisikan dalam layers.js
        // Jika anda mahu ia berfungsi, pastikan fail layers.js anda masih dipanggil atau kod di bawah dilaraskan
        </script>

        <script src="./layers/layers.js" type="text/javascript"></script> 
        
        <script>
        // 3. Masukkan Google Satellite ke dalam senarai layer (Layer Switcher)
        // Kita "unshifting" atau menambah ke permulaan array layersList
        if (typeof layersList !== 'undefined') {
            layersList.unshift(google_hybrid);
            layersList.unshift(google_sat);
            
            // Kemaskini map dengan layers baru
            map.getLayers().clear();
            layersList.forEach(function(layer) {
                map.addLayer(layer);
            });
        }
        </script>

        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>         
    </body>
</html>
