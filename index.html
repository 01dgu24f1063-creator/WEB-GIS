<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        
        <style>
            html, body, #map {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
                background-color: #ffffff;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            /* --- SIDEBAR STYLE --- */
            #sidebar {
                position: absolute;
                top: 0;
                right: 0;
                width: 320px;
                height: 100%;
                background-color: #1e2129;
                color: #ffffff;
                z-index: 2000;
                padding: 25px 20px;
                box-sizing: border-box;
                box-shadow: -5px 0 15px rgba(0,0,0,0.3);
                overflow-y: auto;
            }

            .sidebar-header {
                font-size: 18px;
                font-weight: bold;
                margin-bottom: 25px;
                display: flex;
                align-items: center;
                border-bottom: 1px solid #333;
                padding-bottom: 10px;
            }

            .sidebar-header i { margin-right: 10px; color: #aaa; }

            .section-title {
                font-size: 14px;
                color: #4db8ff;
                margin-bottom: 15px;
                display: flex;
                align-items: center;
            }

            .input-group input {
                width: 100%;
                padding: 12px;
                background: #2c303a;
                border: 1px solid #444;
                color: white;
                border-radius: 6px;
                margin-bottom: 15px;
                box-sizing: border-box;
            }

            .btn {
                width: 100%;
                padding: 12px;
                margin-bottom: 12px;
                border: none;
                border-radius: 6px;
                color: white;
                cursor: pointer;
                font-weight: 600;
                transition: opacity 0.2s;
            }

            .btn:hover { opacity: 0.85; }
            .btn-green { background-color: #28a745; }
            .btn-red { background-color: #dc3545; }
            .btn-blue { background-color: #007bff; }

            /* --- INFO CARDS --- */
            .info-box {
                background: #252831;
                padding: 15px;
                border-radius: 10px;
                margin-bottom: 12px;
                border-left: 4px solid #28a745;
            }

            .info-label {
                font-size: 10px;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 5px;
            }

            .info-value {
                font-size: 16px;
                font-weight: bold;
                color: #2ecc71;
            }

            /* Customizing OL controls to not overlap */
            .ol-zoom { left: 10px; }
            .ol-attribution { bottom: 5px; right: 330px !important; }
        </style>
        <title>Peta Google Satellite - Land Explorer</title>
    </head>
    <body>
        <div id="map"></div>

        <div id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-cog"></i> Tetapan Paparan
            </div>
            
            <div class="section-title">
                <i class="fas fa-globe" style="margin-right:8px;"></i> Land Explorer
            </div>

            <div class="input-group">
                <input type="text" id="lotInput" placeholder="Masukkan No Lot (Contoh: 11462)">
            </div>
            
            <button class="btn btn-green" onclick="searchLot()">Cari Lot</button>
            <button class="btn btn-red" onclick="resetMap()">Reset Peta</button>
            <button class="btn btn-blue" onclick="window.print()">📄 Export Detail + Map (PDF)</button>

            <div style="margin-top:30px;">
                <div class="info-box">
                    <div class="info-label">Total Lot Keseluruhan</div>
                    <div class="info-value" id="resTotal">67</div>
                </div>
                <div class="info-box" style="border-left-color: #4db8ff;">
                    <div class="info-label">No Lot Dipilih</div>
                    <div class="info-value" id="resLot">-</div>
                </div>
                <div class="info-box" style="border-left-color: #f1c40f;">
                    <div class="info-label">Nama Pemilik</div>
                    <div class="info-value" id="resNama">-</div>
                </div>
                <div class="info-box" style="border-left-color: #e74c3c;">
                    <div class="info-label">Luas Lot</div>
                    <div class="info-value" id="resLuas">- m²</div>
                </div>
            </div>
        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="layers/batusempadan_0.js"></script>
        <script src="layers/tandasempadan13clean_1.js"></script>
        <script src="layers/LOTFINAL_2.js"></script>
        <script src="styles/batusempadan_0_style.js"></script>
        <script src="styles/tandasempadan13clean_1_style.js"></script>
        <script src="styles/LOTFINAL_2_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>

        <script>
            // 1. TAMBAH GOOGLE SATELLITE
            var lyr_GoogleSatellite = new ol.layer.Tile({
                title: 'Google Satellite',
                type: 'base',
                visible: true,
                source: new ol.source.XYZ({
                    attributions: '&copy; Google Maps',
                    url: 'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'
                })
            });
            map.getLayers().insertAt(0, lyr_GoogleSatellite);

            // 2. FUNGSI CARIAN LOT
            function searchLot() {
                var inputVal = document.getElementById('lotInput').value.trim();
                if (!inputVal) {
                    alert("Sila masukkan nombor lot!");
                    return;
                }

                var found = false;
                // 'lyr_LOTFINAL_2' adalah nama variable dari fail layers.js anda
                var features = lyr_LOTFINAL_2.getSource().getFeatures();
                
                features.forEach(function(feature) {
                    // PENTING: Tukar 'NO_LOT' di bawah kepada nama column sebenar dalam data anda
                    var attrLot = feature.get('NO_LOT') || feature.get('lot_no') || feature.get('id');
                    
                    if (attrLot == inputVal) {
                        found = true;
                        var extent = feature.getGeometry().getExtent();
                        map.getView().fit(extent, {
                            padding: [100, 350, 100, 100], // Padding supaya lot tak kena tutup dengan sidebar
                            duration: 1200,
                            maxZoom: 19
                        });

                        // Kemaskini Side Panel
                        document.getElementById('resLot').innerText = attrLot;
                        document.getElementById('resNama').innerText = feature.get('NAMA') || feature.get('owner') || 'MAKLUMAT TIADA';
                        document.getElementById('resLuas').innerText = (feature.get('LUAS') || feature.get('area') || '0') + " m²";
                        
                        // Highlight (optional: buat popup atau tukar style)
                    }
                });

                if (!found) alert("No Lot " + inputVal + " tidak dijumpai dalam pangkalan data.");
            }

            function resetMap() {
                document.getElementById('lotInput').value = "";
                document.getElementById('resLot').innerText = "-";
                document.getElementById('resNama').innerText = "-";
                document.getElementById('resLuas').innerText = "- m²";
                map.getView().setCenter(ol.proj.fromLonLat([101.9758, 4.2105])); // Koordinat Malaysia secara umum
                map.getView().setZoom(6);
            }
        </script>
    </body>
</html>
