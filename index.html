<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <script src="https://cdn.tailwindcss.com"></script>
        
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        
        <style>
            html, body { height: 100%; margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; }
            #map { width: 100%; height: 100%; }
            .bg-navbar { background-color: #2d5a27; } 
            .bg-sidebar { background-color: #1e212d; }
            .bg-card { background-color: #111319; }
            .text-accent { color: #4ade80; }
        </style>
        <title>Smart Resident - Land Explorer</title>
    </head>
    <body class="flex flex-col h-screen">

        <nav class="h-[60px] bg-navbar flex items-center justify-between px-6 shadow-lg z-[2000] shrink-0">
            <div class="flex items-center gap-3">
                <div class="flex items-center justify-center bg-white p-1 rounded-full w-10 h-10">
                    <img src="Poli_Logo.png" alt="Logo" class="h-7 w-auto object-contain">
                </div>
                <div class="flex flex-col leading-tight">
                    <h1 class="text-white text-xl font-bold italic uppercase">smart resident</h1>
                    <span class="text-[10px] text-green-400 font-medium uppercase tracking-widest">Land Explorer System</span>
                </div>
            </div>
        </nav>

        <div class="flex flex-1 overflow-hidden relative">
            <div id="map" class="flex-1 z-0 relative"></div>

            <aside class="w-80 bg-sidebar h-full text-white p-5 shadow-2xl z-[1001] border-l border-gray-800">
                <div class="space-y-3 mb-8">
                    <input type="text" id="lotInput" placeholder="Masukkan No Lot (Contoh: 11462)" 
                        class="w-full bg-card border border-gray-700 rounded-md p-3 text-sm text-white focus:ring-1 focus:ring-green-500 outline-none">
                    <button onclick="searchLot()" class="w-full bg-green-700 hover:bg-green-600 py-2.5 rounded-md text-sm font-bold transition text-white">Cari Lot</button>
                    <button onclick="location.reload()" class="w-full bg-red-600 hover:bg-red-500 py-2.5 rounded-md text-sm font-bold transition text-white">Reset Peta</button>
                </div>

                <div class="space-y-4">
                    <div class="bg-card border-l-4 border-green-500 p-4">
                        <p class="text-[9px] text-gray-500 font-bold uppercase">No Lot Dipilih</p>
                        <p class="text-accent text-lg font-bold" id="selectedLot">-</p>
                    </div>
                    <div class="bg-card border-l-4 border-green-500 p-4">
                        <p class="text-[9px] text-gray-500 font-bold uppercase">Nama Pemilik</p>
                        <p class="text-accent text-sm font-bold uppercase" id="ownerName">-</p>
                    </div>
                    <div class="bg-card border-l-4 border-green-500 p-4">
                        <p class="text-[9px] text-gray-500 font-bold uppercase">Luas Lot</p>
                        <p class="text-accent text-lg font-bold" id="lotArea">0 m²</p>
                    </div>
                </div>
            </aside>
        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="layers/Lotfinal_0.js"></script>
        <script src="layers/batusempadanmerge_1.js"></script>
        <script src="styles/Lotfinal_0_style.js"></script>
        <script src="styles/batusempadanmerge_1_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/qgis2web.js"></script>

        <script>
            // 1. Tambah Base Map Google Satellite
            var lyr_GoogleSatellite = new ol.layer.Tile({
                title: 'Google Satellite',
                type: 'base',
                visible: true,
                source: new ol.source.XYZ({
                    url: 'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'
                })
            });
            map.getLayers().insertAt(0, lyr_GoogleSatellite);

            // 2. LOGIK HIGHLIGHT (Tukar Warna)
            // Kita bina satu layer kosong khas untuk "warna pilihan"
            var highlightLayer = new ol.layer.Vector({
                source: new ol.source.Vector(),
                style: new ol.style.Style({
                    fill: new ol.style.Fill({
                        color: 'rgba(255, 255, 0, 0.4)' // Warna kuning lutsinar
                    }),
                    stroke: new ol.style.Stroke({
                        color: '#ffcc33', // Warna garisan oren/kuning
                        width: 3
                    })
                }),
                zIndex: 100
            });
            map.addLayer(highlightLayer);

            // Fungsi untuk kemaskini sidebar & highlight
            function highlightFeature(feature) {
                highlightLayer.getSource().clear(); // Buang highlight lama
                if (feature) {
                    highlightLayer.getSource().addFeature(feature); // Tambah highlight baru
                    
                    var props = feature.getProperties();
                    document.getElementById('selectedLot').innerText = props.NO_LOT || '-';
                    document.getElementById('ownerName').innerText = props['tsp — pe'] || 'DATA TIADA';
                    document.getElementById('lotArea').innerText = (props.AREA || '0') + " m²";
                }
            }

            // 3. Event Klik Peta
            map.on('singleclick', function (evt) {
                var feature = map.forEachFeatureAtPixel(evt.pixel, function (feat) {
                    return feat;
                });
                highlightFeature(feature);
            });

            // 4. Fungsi Carian Lot
            function searchLot() {
                var val = document.getElementById('lotInput').value;
                var found = false;
                
                lyr_Lotfinal_0.getSource().getFeatures().forEach(function(f) {
                    if(f.get('NO_LOT') == val) {
                        var extent = f.getGeometry().getExtent();
                        map.getView().fit(extent, {duration: 1000, padding: [100, 100, 100, 100]});
                        highlightFeature(f); // Jalankan highlight apabila jumpa
                        found = true;
                    }
                });
                
                if(!found) alert("Lot " + val + " tidak dijumpai dalam sistem.");
            }
        </script>
    </body>
</html>
