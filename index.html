<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web GIS - Land Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f0f0f0;
        }

        /* Ruang Simpanan Peta (Placeholder) */
        #map-container {
            flex-grow: 1;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e4/Google_Earth_Satellite_View.jpg'); /* Contoh latar belakang satelit */
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 320px;
            background-color: #1e2229; /* Warna kelabu gelap */
            color: #ffffff;
            height: 100vh;
            padding: 20px;
            overflow-y: auto;
            box-shadow: -5px 0 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .sidebar-header i {
            margin-right: 10px;
        }

        .section-title {
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section-title span {
            margin-left: 8px;
        }

        /* Input & Buttons */
        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #2c313c;
            border: 1px solid #444;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .btn i { margin-right: 8px; }
        .btn:hover { opacity: 0.9; }

        .btn-green { background-color: #2d7d46; }
        .btn-red { background-color: #c0392b; }
        .btn-blue { background-color: #2980b9; }

        /* Info Card Styling */
        .info-card {
            background-color: #161a20;
            border-left: 4px solid #2d7d46;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .info-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 18px;
            font-weight: bold;
            color: #4cd137; /* Warna hijau neon */
        }

        /* Scrollbar kustom */
        .sidebar::-webkit-scrollbar {
            width: 5px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #444;
        }
    </style>
</head>
<body>

    <div id="map-container">
        </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-cog"></i> Tetapan Paparan
        </div>

        <div class="section-title">
            <i class="fas fa-globe-asia"></i> <span>Land Explorer</span>
        </div>

        <div class="input-group">
            <input type="text" id="lotInput" placeholder="Masukkan No Lot..." value="11462">
            
            <button class="btn btn-green" onclick="searchLot()">Cari Lot</button>
            <button class="btn btn-red" onclick="resetMap()">Reset Peta</button>
            <button class="btn btn-blue">
                <i class="fas fa-file-pdf"></i> Export Detail + Map (PDF)
            </button>
        </div>

        <div class="info-card">
            <div class="info-label">Total Lot</div>
            <div class="info-value">67</div>
        </div>

        <div class="info-card">
            <div class="info-label">No Lot Dipilih</div>
            <div class="info-value" id="disp-lot">11462</div>
        </div>

        <div class="info-card">
            <div class="info-label">Nama Pemilik</div>
            <div class="info-value" id="disp-nama">ALI BIN ABU</div>
        </div>

        <div class="info-card">
            <div class="info-label">Luas Lot</div>
            <div class="info-value" id="disp-luas">106.825 m²</div>
        </div>
    </div>

    <script>
        function searchLot() {
            const lotNo = document.getElementById('lotInput').value;
            if(lotNo) {
                document.getElementById('disp-lot').innerText = lotNo;
                alert('Mencari Lot: ' + lotNo);
                // Di sini anda boleh masukkan logik AJAX/Fetch untuk ambil data dari database
            }
        }

        function resetMap() {
            document.getElementById('lotInput').value = '';
            alert('Peta telah di-reset.');
        }
    </script>
</body>
</html>
